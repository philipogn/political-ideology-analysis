services:
  postgres:
    image: postgres:16
    container_name: poliscope-postgres
    environment:
      POSTGRES_DB: poliscope
      POSTGRES_USER: poliscope
      POSTGRES_PASSWORD: poliscope
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: